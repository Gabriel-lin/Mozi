services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mozi
      POSTGRES_PASSWORD: mozi_secret
      POSTGRES_DB: mozi
    volumes:
      - mozi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mozi -d mozi"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - mozi-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mozi-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - mozi-net

  migrate:
    build:
      context: ./server
      dockerfile: services/auth/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_ENV: development
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: bash scripts/migrate.sh
    networks:
      - mozi-net

  auth-service:
    build:
      context: ./server
      dockerfile: services/auth/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: development
      MOZI_DEBUG: "true"
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: uv run uvicorn services.auth.main:app --host 0.0.0.0 --port 3001 --reload
    networks:
      - mozi-net

  workspace-service:
    build:
      context: ./server
      dockerfile: services/workspace/Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: development
      MOZI_DEBUG: "true"
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: uv run uvicorn services.workspace.main:app --host 0.0.0.0 --port 3002 --reload
    networks:
      - mozi-net

  agent-service:
    build:
      context: ./server
      dockerfile: services/agent/Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: development
      MOZI_DEBUG: "true"
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: uv run uvicorn services.agent.main:app --host 0.0.0.0 --port 3003 --reload
    networks:
      - mozi-net

  sandbox-worker:
    build:
      context: ./server
      dockerfile: services/sandbox/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: development
      MOZI_DEBUG: "true"
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: uv run celery -A services.sandbox.main:celery_app worker -Q agent-runs -c 2 --loglevel=info
    networks:
      - mozi-net

  mcp-service:
    build:
      context: ./server
      dockerfile: services/mcp/Dockerfile
    ports:
      - "3005:3005"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    env_file:
      - server/.env
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://mozi:mozi_secret@postgres:5432/mozi
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: development
      MOZI_DEBUG: "true"
      UV_LINK_MODE: copy
    volumes:
      - ./server:/app
      - /app/.venv
    command: uv run uvicorn services.mcp.main:app --host 0.0.0.0 --port 3005 --reload
    networks:
      - mozi-net

volumes:
  mozi-postgres-data:

networks:
  mozi-net:
    driver: bridge
