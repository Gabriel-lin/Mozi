apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: mozi
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: mozi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
      app.kubernetes.io/part-of: mozi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/part-of: mozi
    spec:
      nodeSelector:
        gpu: a100
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mozi-config
            - secretRef:
                name: mozi-secret
          env:
            - name: VLLM_MODEL
              value: "meta-llama/Llama-3.1-8B-Instruct"
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
