apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mozi
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: mozi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: mozi
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
