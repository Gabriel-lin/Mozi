apiVersion: v1
kind: ConfigMap
metadata:
  name: mozi-config
  namespace: mozi
  labels:
    app.kubernetes.io/part-of: mozi
data:
  MOZI_ENV: "production"
  MOZI_VLLM_BASE_URL: "http://vllm:8000/v1"
  MOZI_REDIS_URL: "redis://redis:6379"
  MOZI_DATABASE_URL: "postgresql+asyncpg://mozi:$(MOZI_DB_PASSWORD)@postgres:5432/mozi"
  MOZI_MCP_SERVER_NAME: "mozi"
