apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-service
  namespace: mozi
  labels:
    app.kubernetes.io/name: sandbox-service
    app.kubernetes.io/part-of: mozi
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-service
      app.kubernetes.io/part-of: mozi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-service
        app.kubernetes.io/part-of: mozi
    spec:
      containers:
        - name: sandbox-worker
          image: registry.cn-hangzhou.aliyuncs.com/mozi/sandbox-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mozi-config
            - secretRef:
                name: mozi-secret
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
