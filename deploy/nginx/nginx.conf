worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─── 限流 ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── 上游服务 ─────────────────────────────────────
    upstream auth_backend {
        server auth-service:3001;
        keepalive 16;
    }

    upstream workspace_backend {
        server workspace-service:3002;
        keepalive 16;
    }

    upstream agent_backend {
        server agent-service:3003;
        keepalive 16;
    }

    upstream workflow_backend {
        server workflow-service:3004;
        keepalive 16;
    }

    upstream mcp_backend {
        server mcp-service:3005;
        keepalive 16;
    }

    # ─── HTTP → HTTPS 重定向 ──────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS 主配置 ─────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL 证书路径（通过 volume 挂载或 certbot 生成）
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # ─── 安全头 ──────────────────────────────────
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ─── API 路由 ────────────────────────────────

        # Auth 服务
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 30;
            proxy_pass http://auth_backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Workspace 服务（含 users 路由）
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://workspace_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/workspaces/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://workspace_backend;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/v1/toolkits/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://workspace_backend;
            include /etc/nginx/proxy_params.conf;
        }

        # Agent 服务
        location /api/v1/agents/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://agent_backend;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Workflow 服务
        location /api/v1/workflows/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://workflow_backend;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # MCP 服务
        location /api/v1/mcp/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://mcp_backend;
            include /etc/nginx/proxy_params.conf;
            proxy_read_timeout 300s;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # MinIO 对象存储代理（可选）
        location /storage/ {
            proxy_pass http://minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 100m;
        }

        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
