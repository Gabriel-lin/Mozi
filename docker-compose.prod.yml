services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${MOZI_DB_USER:-mozi}
      POSTGRES_PASSWORD: ${MOZI_DB_PASSWORD:?MOZI_DB_PASSWORD is required}
      POSTGRES_DB: ${MOZI_DB_NAME:-mozi}
    volumes:
      - mozi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mozi -d mozi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - mozi-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mozi-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MOZI_MINIO_ACCESS_KEY:?MOZI_MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MOZI_MINIO_SECRET_KEY:?MOZI_MINIO_SECRET_KEY is required}
    volumes:
      - mozi-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mozi-net

  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/auth-service:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_ENV: production
    command: bash scripts/migrate.sh
    networks:
      - mozi-net
    restart: "no"

  auth-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/auth-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_JWT_SECRET: ${MOZI_JWT_SECRET:?MOZI_JWT_SECRET is required}
      MOZI_GITHUB_CLIENT_ID: ${MOZI_GITHUB_CLIENT_ID}
      MOZI_GITHUB_CLIENT_SECRET: ${MOZI_GITHUB_CLIENT_SECRET}
      MOZI_CORS_ORIGINS: ${MOZI_CORS_ORIGINS:-["https://mozi.example.com"]}
      MOZI_MINIO_ENDPOINT: minio:9000
      MOZI_MINIO_ACCESS_KEY: ${MOZI_MINIO_ACCESS_KEY}
      MOZI_MINIO_SECRET_KEY: ${MOZI_MINIO_SECRET_KEY}
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 512M

  workspace-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/workspace-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_JWT_SECRET: ${MOZI_JWT_SECRET}
      MOZI_MINIO_ENDPOINT: minio:9000
      MOZI_MINIO_ACCESS_KEY: ${MOZI_MINIO_ACCESS_KEY}
      MOZI_MINIO_SECRET_KEY: ${MOZI_MINIO_SECRET_KEY}
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 512M

  agent-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/agent-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_JWT_SECRET: ${MOZI_JWT_SECRET}
      MOZI_VLLM_BASE_URL: ${MOZI_VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      MOZI_VLLM_MODEL: ${MOZI_VLLM_MODEL:-mozi-default}
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 1G

  workflow-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/workflow-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_JWT_SECRET: ${MOZI_JWT_SECRET}
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 512M

  sandbox-worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/sandbox-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 1G

  mcp-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-gabriel-lin/mozi}/mcp-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      MOZI_DATABASE_URL: postgresql+asyncpg://${MOZI_DB_USER:-mozi}:${MOZI_DB_PASSWORD}@postgres:5432/${MOZI_DB_NAME:-mozi}
      MOZI_REDIS_URL: redis://redis:6379
      MOZI_JWT_SECRET: ${MOZI_JWT_SECRET}
      MOZI_MCP_SERVER_NAME: ${MOZI_MCP_SERVER_NAME:-mozi}
      MOZI_MCP_SERVER_VERSION: ${MOZI_MCP_SERVER_VERSION:-0.1.0}
      MOZI_ENV: production
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - mozi-certbot-webroot:/var/www/certbot:ro
    depends_on:
      - auth-service
      - workspace-service
      - agent-service
      - workflow-service
      - mcp-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - mozi-net
    deploy:
      resources:
        limits:
          memory: 256M

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./deploy/nginx/ssl:/etc/letsencrypt
      - mozi-certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - mozi-net

volumes:
  mozi-postgres-data:
  mozi-redis-data:
  mozi-minio-data:
  mozi-certbot-webroot:

networks:
  mozi-net:
    driver: bridge
